services:
  db:
    image: postgres:15-alpine
    container_name: t3-db-prod
    environment:
      POSTGRES_USER: \${POSTGRES_USER}
      POSTGRES_PASSWORD: \${POSTGRES_PASSWORD}
      POSTGRES_DB: \${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["prod_data:/var/lib/postgresql/data"]

  db-test:
    image: postgres:15-alpine
    container_name: t3-db-test
    environment:
      POSTGRES_USER: \${POSTGRES_USER}
      POSTGRES_PASSWORD: \${POSTGRES_PASSWORD}
      POSTGRES_DB: \${POSTGRES_DB}_test
    ports: ["5433:5432"]

  app:
    build: .
    ports: ["3000:3000"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://\${POSTGRES_USER}:\${POSTGRES_PASSWORD}@db:5432/\${POSTGRES_DB}
    depends_on: [db]

volumes:
  prod_data: